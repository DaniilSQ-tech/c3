<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькулятор</title>
  <script>
    (function () {
      const savedTheme = localStorage.getItem("calculator-theme");
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      document.documentElement.setAttribute("data-theme", savedTheme || (prefersDark ? "dark" : "light"));
    })();
  </script>
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      --calc-bg: #1e1e2e;
      --calc-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      --display-bg: #12121a;
      --text-muted: #888;
      --text-primary: #fff;
      --btn-number-bg: #2d2d44;
      --btn-number-hover: #3d3d5c;
      --btn-action-bg: #3d3d5c;
      --btn-action-hover: #4d4d6c;
      --btn-operator-bg: #e94560;
      --btn-operator-hover: #ff6b81;
      --btn-clear-bg: #dc2626;
      --btn-clear-hover: #ef4444;
      --btn-equals-bg: #0f3460;
      --btn-equals-hover: #1a4a7a;
      --theme-toggle-bg: #2d2d44;
      --theme-toggle-hover: #3d3d5c;
      --theme-toggle-color: #fff;
      --history-bg: #12121a;
      --history-border: rgba(255, 255, 255, 0.06);
      --history-result: #e94560;
    }

    [data-theme="light"] {
      --bg-gradient: linear-gradient(135deg, #e8eef5 0%, #d4e0ed 50%, #c5d5e8 100%);
      --calc-bg: #ffffff;
      --calc-shadow: 0 20px 60px rgba(15, 52, 96, 0.15);
      --display-bg: #f0f4f8;
      --text-muted: #64748b;
      --text-primary: #1e293b;
      --btn-number-bg: #e2e8f0;
      --btn-number-hover: #cbd5e1;
      --btn-action-bg: #cbd5e1;
      --btn-action-hover: #94a3b8;
      --btn-operator-bg: #e94560;
      --btn-operator-hover: #ff6b81;
      --btn-clear-bg: #dc2626;
      --btn-clear-hover: #ef4444;
      --btn-equals-bg: #0f3460;
      --btn-equals-hover: #1a4a7a;
      --theme-toggle-bg: #e2e8f0;
      --theme-toggle-hover: #cbd5e1;
      --theme-toggle-color: #1e293b;
      --history-bg: #f0f4f8;
      --history-border: rgba(15, 52, 96, 0.08);
      --history-result: #e94560;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-gradient);
      font-family: "Segoe UI", system-ui, sans-serif;
      transition: background 0.3s ease;
      padding: 24px 16px;
    }

    .app {
      display: flex;
      gap: 20px;
      align-items: stretch;
      max-width: 100%;
    }

    @media (max-width: 680px) {
      .app {
        flex-direction: column;
        align-items: center;
      }
    }

    .calculator {
      width: 320px;
      background: var(--calc-bg);
      border-radius: 20px;
      padding: 24px;
      box-shadow: var(--calc-shadow);
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }

    .calculator-header {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 12px;
    }

    .theme-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 10px;
      background: var(--theme-toggle-bg);
      color: var(--theme-toggle-color);
      font-size: 20px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .theme-toggle:hover {
      background: var(--theme-toggle-hover);
    }

    .theme-toggle:active {
      transform: scale(0.95);
    }

    .theme-toggle .icon-sun,
    .theme-toggle .icon-moon {
      line-height: 1;
    }

    [data-theme="dark"] .theme-toggle .icon-sun {
      display: none;
    }

    [data-theme="light"] .theme-toggle .icon-moon {
      display: none;
    }

    .display {
      background: var(--display-bg);
      border-radius: 12px;
      padding: 20px 16px;
      margin-bottom: 20px;
      text-align: right;
      transition: background 0.3s ease;
    }

    .display-expression {
      color: var(--text-muted);
      font-size: 14px;
      min-height: 20px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .display-value {
      color: var(--text-primary);
      font-size: 36px;
      font-weight: 300;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 18px;
      font-size: 20px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, color 0.3s ease;
    }

    button:active {
      transform: scale(0.95);
    }

    .btn-number {
      background: var(--btn-number-bg);
      color: var(--text-primary);
    }

    .btn-number:hover {
      background: var(--btn-number-hover);
    }

    .btn-operator {
      background: var(--btn-operator-bg);
      color: #fff;
    }

    .btn-operator:hover {
      background: var(--btn-operator-hover);
    }

    .btn-action {
      background: var(--btn-action-bg);
      color: var(--text-primary);
    }

    .btn-action:hover {
      background: var(--btn-action-hover);
    }

    .btn-clear {
      background: var(--btn-clear-bg);
      color: #fff;
    }

    .btn-clear:hover {
      background: var(--btn-clear-hover);
    }

    .btn-equals {
      background: var(--btn-equals-bg);
      color: #fff;
    }

    .btn-equals:hover {
      background: var(--btn-equals-hover);
    }

    .btn-zero {
      grid-column: span 2;
    }

    .history-panel {
      width: 280px;
      background: var(--calc-bg);
      border-radius: 20px;
      padding: 20px;
      box-shadow: var(--calc-shadow);
      display: flex;
      flex-direction: column;
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }

    @media (max-width: 680px) {
      .history-panel {
        width: 320px;
        max-height: 220px;
      }
    }

    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      gap: 8px;
    }

    .history-title {
      color: var(--text-primary);
      font-size: 16px;
      font-weight: 600;
    }

    .history-clear {
      border: none;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
      background: var(--btn-action-bg);
      color: var(--text-muted);
      transition: background 0.15s, color 0.15s;
    }

    .history-clear:hover {
      background: var(--btn-action-hover);
      color: var(--text-primary);
    }

    .history-list {
      list-style: none;
      overflow-y: auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
    }

    .history-list:empty::after {
      content: "Пока нет операций";
      display: block;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      padding: 24px 8px;
    }

    .history-item {
      background: var(--history-bg);
      border: 1px solid var(--history-border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.4;
      transition: background 0.3s ease;
    }

    .history-item time {
      display: block;
      font-size: 11px;
      margin-bottom: 4px;
      opacity: 0.75;
    }

    .history-item .history-result {
      color: var(--history-result);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="app">
  <div class="calculator">
    <div class="calculator-header">
      <button class="theme-toggle" id="themeToggle" type="button" aria-label="Переключить тему">
        <span class="icon-sun" aria-hidden="true">☀</span>
        <span class="icon-moon" aria-hidden="true">☾</span>
      </button>
    </div>
    <div class="display">
      <div class="display-expression" id="expression"></div>
      <div class="display-value" id="display">0</div>
    </div>
    <div class="buttons">
      <button class="btn-clear" data-action="clear">C</button>
      <button class="btn-action" data-action="delete">⌫</button>
      <button class="btn-action" data-action="percent">%</button>
      <button class="btn-operator" data-operator="/">÷</button>

      <button class="btn-number" data-number="7">7</button>
      <button class="btn-number" data-number="8">8</button>
      <button class="btn-number" data-number="9">9</button>
      <button class="btn-operator" data-operator="*">×</button>

      <button class="btn-number" data-number="4">4</button>
      <button class="btn-number" data-number="5">5</button>
      <button class="btn-number" data-number="6">6</button>
      <button class="btn-operator" data-operator="-">−</button>

      <button class="btn-number" data-number="1">1</button>
      <button class="btn-number" data-number="2">2</button>
      <button class="btn-number" data-number="3">3</button>
      <button class="btn-operator" data-operator="+">+</button>

      <button class="btn-number btn-zero" data-number="0">0</button>
      <button class="btn-number" data-number=".">.</button>
      <button class="btn-equals" data-action="equals">=</button>
    </div>
  </div>

  <aside class="history-panel">
    <div class="history-header">
      <h2 class="history-title">Журнал</h2>
      <button class="history-clear" id="historyClear" type="button">Очистить</button>
    </div>
    <ul class="history-list" id="historyList"></ul>
  </aside>
  </div>

  <script>
    const themeToggle = document.getElementById("themeToggle");
    themeToggle.addEventListener("click", () => {
      const current = document.documentElement.getAttribute("data-theme");
      const next = current === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", next);
      localStorage.setItem("calculator-theme", next);
    });

    const displayEl = document.getElementById("display");
    const expressionEl = document.getElementById("expression");
    const historyList = document.getElementById("historyList");
    const historyClear = document.getElementById("historyClear");

    const OP_SYMBOLS = { "+": "+", "-": "−", "*": "×", "/": "÷" };
    const MAX_HISTORY = 50;
    const HISTORY_KEY = "calculator-history";

    let currentValue = "0";
    let previousValue = "";
    let operator = null;
    let shouldResetDisplay = false;

    function formatTime(date) {
      return date.toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    }

    function addHistoryEntry(a, op, b, result) {
      const li = document.createElement("li");
      li.className = "history-item";
      const opSymbol = OP_SYMBOLS[op];
      li.innerHTML = `<time>${formatTime(new Date())}</time>${a} ${opSymbol} ${b} = <span class="history-result">${result}</span>`;
      historyList.prepend(li);
      while (historyList.children.length > MAX_HISTORY) {
        historyList.removeChild(historyList.lastChild);
      }
      saveHistory();
    }

    function saveHistory() {
      const entries = [...historyList.children].map((item) => item.innerHTML);
      localStorage.setItem(HISTORY_KEY, JSON.stringify(entries));
    }

    function loadHistory() {
      try {
        const saved = JSON.parse(localStorage.getItem(HISTORY_KEY));
        if (!Array.isArray(saved)) return;
        saved.forEach((html) => {
          const li = document.createElement("li");
          li.className = "history-item";
          li.innerHTML = html;
          historyList.appendChild(li);
        });
      } catch {
        localStorage.removeItem(HISTORY_KEY);
      }
    }

    function clearHistory() {
      historyList.innerHTML = "";
      localStorage.removeItem(HISTORY_KEY);
    }

    historyClear.addEventListener("click", clearHistory);
    loadHistory();

    function updateDisplay() {
      displayEl.textContent = currentValue;
      if (previousValue && operator) {
        const opSymbol = OP_SYMBOLS[operator];
        expressionEl.textContent = `${previousValue} ${opSymbol}`;
      } else {
        expressionEl.textContent = "";
      }
    }

    function inputNumber(digit) {
      if (shouldResetDisplay) {
        currentValue = digit === "." ? "0." : digit;
        shouldResetDisplay = false;
      } else if (digit === "." && currentValue.includes(".")) {
        return;
      } else if (currentValue === "0" && digit !== ".") {
        currentValue = digit;
      } else {
        currentValue += digit;
      }
      updateDisplay();
    }

    function inputOperator(op) {
      if (operator && !shouldResetDisplay) {
        calculate();
      }
      previousValue = currentValue;
      operator = op;
      shouldResetDisplay = true;
      updateDisplay();
    }

    function calculate() {
      if (!operator || !previousValue) return;

      const a = parseFloat(previousValue);
      const b = parseFloat(currentValue);
      const op = operator;

      if (op === "/" && b === 0) {
        addHistoryEntry(previousValue, op, currentValue, "Ошибка");
        currentValue = "Ошибка";
        previousValue = "";
        operator = null;
        shouldResetDisplay = true;
        updateDisplay();
        return;
      }

      const result = {
        "+": a + b,
        "-": a - b,
        "*": a * b,
        "/": a / b,
      }[op];

      const formatted = formatResult(result);
      addHistoryEntry(previousValue, op, currentValue, formatted);
      currentValue = formatted;
      previousValue = "";
      operator = null;
      shouldResetDisplay = true;
      updateDisplay();
    }

    function formatResult(num) {
      if (!Number.isFinite(num)) return "Ошибка";
      const rounded = parseFloat(num.toPrecision(12));
      return String(rounded);
    }

    function clear() {
      currentValue = "0";
      previousValue = "";
      operator = null;
      shouldResetDisplay = false;
      updateDisplay();
    }

    function deleteLast() {
      if (shouldResetDisplay || currentValue === "Ошибка") {
        clear();
        return;
      }
      if (currentValue.length > 1) {
        currentValue = currentValue.slice(0, -1);
      } else {
        currentValue = "0";
      }
      updateDisplay();
    }

    function percent() {
      const num = parseFloat(currentValue);
      currentValue = formatResult(num / 100);
      updateDisplay();
    }

    document.querySelector(".buttons").addEventListener("click", (e) => {
      const btn = e.target.closest("button");
      if (!btn) return;

      if (btn.dataset.number) {
        inputNumber(btn.dataset.number);
      } else if (btn.dataset.operator) {
        inputOperator(btn.dataset.operator);
      } else if (btn.dataset.action === "equals") {
        calculate();
      } else if (btn.dataset.action === "clear") {
        clear();
      } else if (btn.dataset.action === "delete") {
        deleteLast();
      } else if (btn.dataset.action === "percent") {
        percent();
      }
    });

    document.addEventListener("keydown", (e) => {
      if (e.key >= "0" && e.key <= "9") inputNumber(e.key);
      else if (e.key === ".") inputNumber(".");
      else if (e.key === "+") inputOperator("+");
      else if (e.key === "-") inputOperator("-");
      else if (e.key === "*") inputOperator("*");
      else if (e.key === "/") {
        e.preventDefault();
        inputOperator("/");
      } else if (e.key === "Enter" || e.key === "=") calculate();
      else if (e.key === "Escape") clear();
      else if (e.key === "Backspace") deleteLast();
      else if (e.key === "%") percent();
    });
  </script>
</body>
</html>
